<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">

    <title>FreeLand — биржа фриланса: поиск исполнителей и заказов</title>

    <!-- Базовые SEO-метатеги (фолбэк до запуска SPA; на маршрутах перезаписываются динамически) -->
    <meta name="description" content="FreeLand — платформа для фрилансеров и заказчиков. Публикуйте проекты, находите проверенных специалистов и проводите безопасные сделки через эскроу.">
    <meta name="keywords" content="фриланс, биржа фриланса, найти фрилансера, заказы для фрилансеров, удалённая работа, исполнители, проекты">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://freeland.example.com/">

    <!-- Open Graph (соцсети) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="FreeLand">
    <meta property="og:title" content="FreeLand — биржа фриланса">
    <meta property="og:description" content="Публикуйте проекты, находите специалистов и проводите безопасные сделки через эскроу.">
    <meta property="og:url" content="https://freeland.example.com/">
    <meta property="og:image" content="https://freeland.example.com/img/EasyProject.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FreeLand — биржа фриланса">
    <meta name="twitter:description" content="Публикуйте проекты, находите специалистов и проводите безопасные сделки через эскроу.">
    <meta name="twitter:image" content="https://freeland.example.com/img/EasyProject.png">
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
  </body>
</html>
